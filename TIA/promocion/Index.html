<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Super TIA</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <span class="encabezado">
            <span class="logo">
                <img src="logo.png" alt="Logo Supermercado">
                <h1>Super TIA</h1>
            </span>
                <form name="busqueda" method="get" target="_blank">
                    <input class="buscador" id="input-busca" name="busca-form" type="search" placeholder="¿Qué estás buscando? ">
                    <input class="buscar" type="submit" value="Buscar">
                </form>
        </span>
        <nav class="contenedor">
            <ul class="menu">
                <li>Inicio</li>
                <li>Ofertas</li>
                <li>Categorias</li>
                <li>Promociones</li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <span class="productos">
                <article>
                    <img src="agua.jpg" alt="Agua mineral">
                    <p class="prod">Agua mineral</p>
                    <p class="precio">$500</p>
                </article>
                <article>
                    <img src="arroz.jpg" alt="Arroz blanco">
                    <p class="prod">Arroz blanco</p>
                    <p class="precio">$1700</p>
    
                </article>
                <article>
                    <img src="desodorante.jpg" alt="Desodorante">
                    <p class="prod">Desodorante</p>
                    <p class="precio">$2300</p>
                </article>
                <article>
                    <img src="galletitas.jpg" alt="Galletitas">
                    <p class="prod">Galletitas</p>
                    <p class="precio">$800</p>
                </article>
            </span>
            <span class="productos">
                <article>
                    <img src="leche.jpg" alt="Leche entera">
                    <p class="prod">Leche entera</p>
                    <p class="precio">$1200</p>
                </article>
                <article>
                    <img src="mermelada.jpg" alt="Mermelada">
                    <p class="prod">Mermelada</p>
                    <p class="precio">$1900</p>
                </article>
                <article>
                    <img src="papel.jpg" alt="Papel higiénico">
                    <p class="prod">Papel higiénico</p>
                    <p class="precio">$2300</p>
                </article>
                <article>
                    <img src="yerba.jpg" alt="Yerba mate">
                    <p class="prod">Yerba mate</p>
                    <p class="precio">$3400</p>
                </article>
            </span>            
        </section>
    </main>
    <footer>
        <p>Super TIA - Todos los derechos reservados</p>
    </footer>
    
</body>
</html>
